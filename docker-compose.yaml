version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: torneos-postgres
    environment:
      POSTGRES_DB: torneos
      POSTGRES_USER: torneos
      POSTGRES_PASSWORD: torneos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: torneos-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  users-service:
    build:
      context: ./users-service
    container_name: users-service
    depends_on:
      - postgres
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/torneos
      SPRING_R2DBC_USERNAME: torneos
      SPRING_R2DBC_PASSWORD: torneos
      SERVER_PORT: 8081
    ports:
      - "8081:8081"

  tournaments-service:
    build:
      context: ./tournaments-service
    container_name: tournaments-service
    depends_on:
      - postgres
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/torneos
      SPRING_R2DBC_USERNAME: torneos
      SPRING_R2DBC_PASSWORD: torneos
      SERVER_PORT: 8082
    ports:
      - "8082:8082"

  registration-service:
    build:
      context: ./registration-service
    container_name: registration-service
    depends_on:
      - postgres
      - rabbitmq
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/torneos
      SPRING_R2DBC_USERNAME: torneos
      SPRING_R2DBC_PASSWORD: torneos
      SERVER_PORT: 8083
    ports:
      - "8083:8083"
  teams-service:
    build:
      context: ./teams-service
    container_name: teams-service
    depends_on:
      - postgres
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/torneos
      SPRING_R2DBC_USERNAME: torneos
      SPRING_R2DBC_PASSWORD: torneos
      SERVER_PORT: 8084
    ports:
      - "8084:8084"

volumes:
  pgdata: